services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://wilco:wilco@db:5432/wilco
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wilco
      POSTGRES_PASSWORD: wilco
      POSTGRES_DB: wilco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wilco"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
